<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏳ Analyzing - Plant Disease Detector</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .process-card {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .icon {
            margin-bottom: 30px;
        }

        .icon i {
            font-size: 70px;
            color: #667eea;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 40px;
        }

        .spinner-container {
            margin: 40px 0;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #667eea;
            border-right: 6px solid #764ba2;
            border-bottom: 6px solid #667eea;
            border-left: 6px solid #764ba2;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 30px 0;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            animation: progress 5s ease-in-out forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            20% { width: 20%; }
            40% { width: 40%; }
            60% { width: 60%; }
            80% { width: 80%; }
            100% { width: 100%; }
        }

        .status-box {
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            border-radius: 15px;
            padding: 20px;
            margin: 30px 0;
        }

        .status-text {
            font-size: 18px;
            color: #667eea;
            font-weight: 500;
        }

        .status-icon {
            margin-right: 10px;
        }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .back-link {
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .cancel-btn {
            background: #f8f9fa;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .cancel-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="process-card">
            <div class="icon">
                <i class="fas fa-microscope"></i>
            </div>
            
            <h2>Analyzing Your Leaf</h2>
            <p>Our AI is examining your plant<span class="dots"></span></p>
            
            <div class="spinner-container">
                <div class="spinner"></div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <div class="status-box" id="statusBox">
                <div class="status-text" id="statusText">
                    <i class="fas fa-search status-icon"></i> Scanning leaf...
                </div>
            </div>

            <div class="cancel-btn" onclick="window.location.href='/'">
                <i class="fas fa-times"></i> Cancel Analysis
            </div>

            <div class="back-link">
                <a href="/"><i class="fas fa-arrow-left"></i> Go back</a>
            </div>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('statusText');
        const messages = [
            { icon: 'fa-search', text: 'Scanning leaf...' },
            { icon: 'fa-palette', text: 'Analyzing colors...' },
            { icon: 'fa-chart-line', text: 'Checking disease patterns...' },
            { icon: 'fa-calculator', text: 'Calculating confidence...' },
            { icon: 'fa-check-circle', text: 'Finalizing results...' }
        ];

        let index = 0;
        const interval = setInterval(() => {
            if (index < messages.length) {
                statusText.innerHTML = `<i class="fas ${messages[index].icon} status-icon"></i> ${messages[index].text}`;
                index++;
            }
        }, 1800);

        setTimeout(() => {
            clearInterval(interval);
            window.location.href = '/results';
        }, 9000);
    </script>
</body>
</html>
